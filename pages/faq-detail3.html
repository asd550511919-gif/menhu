            margin: 0;
            padding: 0;

            outline: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            border: none;
            margin: 0;
            padding: 0;
        }

        .page-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #000;
        }

        .frame-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .frame-wrapper.fade-out {
            opacity: 0;
            transform: scale(1.1) !important;
        }

        .frame2 {
            display: flex;
            align-items: center;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .group34 {
            position: relative;
            width: 1920px;
            height: 1080px;
        }

        .faq-detail-bg {
            position: absolute;
            width: 1920px;
            height: 1080px;
            left: 0px;
            top: 0px;
        }

        .faq-detail-overlay {
            position: absolute;
            width: 1920px;
            height: 1080px;
            left: 0px;
            top: 0px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0) 10%, rgba(0, 0, 0, 0.3) 30%, rgba(0, 0, 0, 0.8) 50%, #000000 70%);
            z-index: 4;
        }

        .group22 {
            display: flex;
            position: absolute;
            top: 1021px;
            left: 105px;
            align-items: flex-start;
            justify-content: space-between;
            width: 1710px;
            height: 29px;
            z-index: 10;
        }

        .footer-copyright {
            line-height: 24px;
            letter-spacing: -0.4px;
            color: #9a9a9a;
            font-family: "Albert Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 20px;
        }

        .footer-site-by {
            margin: 5px 0px 0px;
            width: 547px;
            text-align: right;
            letter-spacing: -0.4px;
            color: #9a9a9a;
            font-family: "Albert Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 20px;
        }

        .content-image {
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
    </style>
    <script>
        function scalePage() {
            const targetWidth = 1920;
            const targetHeight = 1080;
            
            const actualWidth = window.innerWidth;
            const actualHeight = window.innerHeight;
            
            const scaleX = actualWidth / targetWidth;
            const scaleY = actualHeight / targetHeight;
            const scale = Math.min(scaleX, scaleY);
            
            const wrapper = document.querySelector('.frame-wrapper');
            const frame2 = document.querySelector('.frame2');
            
            if (wrapper && frame2) {
                wrapper.style.transform = 'scale(' + scale + ')';
                wrapper.style.width = targetWidth + 'px';
                wrapper.style.height = targetHeight + 'px';
                frame2.style.transform = 'none';
                
                wrapper.style.opacity = '0';
                setTimeout(function() {
                    wrapper.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                    wrapper.style.opacity = '1';
                }, 50);
            }
        }
        
        function navigateToPage(pageName) {
            const wrapper = document.querySelector('.frame-wrapper');
            if (wrapper) {
                wrapper.classList.add('fade-out');
                setTimeout(function() {
                    window.location.href = pageName + '.html';
                }, 600);
            }
        }
        
        window.addEventListener('load', scalePage);
        window.addEventListener('resize', scalePage);
    </script>
